default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: <%= ENV.fetch("DB_USERNAME") %>
  password: <%= ENV.fetch("DB_PASSWORD") %>
  host: localhost

development:
  <<: *default
  database: finpay_api_development

test:
  <<: *default
  database: finpay_api_test

production:
  <<: *default
  database: finpay_api_production